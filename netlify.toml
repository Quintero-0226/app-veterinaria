[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "express",
    "ejs",
    "express-ejs-layouts",
    "cookie-session",
    "better-sqlite3",
    "bcryptjs",
    "morgan",
    "serverless-http"
  ]
  included_files = ["views/**", "src/**"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true
